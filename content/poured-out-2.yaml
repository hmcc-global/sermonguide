series: Poured Out
part: 'Part 2: Pastor Keith Park'
order: 28
date: 2025-12-07
recap:
- 'This Sunday, Pastor Keith Park spoke on the church’s true calling in a message titled “Poured Out:
  Missions.” Drawing from Revelation 7, Acts 1, and Matthew 28, he reminded us that mission is not an
  optional program of the church — it is the essence of the church. From the beginning, God’s heart has
  been for every ethnos — every people and nation — to hear and respond to the gospel. Pastor Keith challenged
  us to break free from our comfort zones, the narrow comfort of our own suburban or cultural bubbles,
  and to rediscover a global vision for God’s kingdom. The call to mission is not reserved for a few but
  entrusted to every believer who follows Christ.'
- 'He shared powerful stories of costly obedience — believers who gave their lives to preach Christ in
  post-Soviet villages poisoned by radiation, missionaries returning to war-torn areas to serve despite
  danger, and families who surrendered wealth and comfort to bring hope to the poor. Each story revealed
  the same truth: a church without mission betrays its identity. Just as the Holy Spirit came at Pentecost
  to empower disciples to be witnesses to the ends of the earth, God continues to call His people to walk
  in the “good works prepared beforehand” (Ephesians 2:10). Pastor Keith concluded that the abundant life
  Jesus promised is found only when we live for something greater than ourselves — when we join God’s
  global redemptive story with surrendered hearts.'
- The
one_thing: We are created for God’s mission — to live and die for the glory of Christ among all nations.
discussion_questions:
  Connecting:
  - What comes to mind when you hear the word “missions”? Have you ever met someone who inspired you to
    think differently about it?
  - If you could visit any country in the world, which would you choose — and why?
  Confessing:
  - What are some “comfort zones” that might limit how you see God’s mission in the world?
  - Are there ways you’ve viewed mission as someone else’s calling instead of your own?
  Considering:
  - Pastor Keith said “church and mission are redundant terms.” Why is mission central to the identity
    of the church?
  - How does seeing the global church — especially persecuted or suffering believers — expand our understanding
    of what faith looks like?
  Committing:
  - What is one way you can participate in God’s mission this month — through prayer, giving, or going?
  - How can you begin living more intentionally as a “credible witness” for Christ where you are right
    now?
