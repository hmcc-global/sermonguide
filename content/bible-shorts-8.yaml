series: "Bible Shorts"
part: "Part 8: Titus 1"
date: "2026-06-15"

scripture_title: "Titus 1"
scripture_passage:
  - >
    ^5 This is why I left you in Crete, so that you might put what remained into
    order, and appoint elders in every town as I directed you— ^6 if anyone is
    above reproach, the husband of one wife, and his children are believers and
    not open to the charge of debauchery or insubordination.
  - >
    ^7 For an overseer, as God's steward, must be above reproach. He must not be
    arrogant or quick-tempered or a drunkard or violent or greedy for gain,
    ^8 but hospitable, a lover of good, self-controlled, upright, holy, and
    disciplined.

recap:
  - >
    Pastor Josh opened the Bible Shorts series in Titus, setting the scene for
    Paul's letter to his coworker on the difficult island of Crete. Before
    getting to how the wider church should live, Paul starts with leadership:
    the character of the people who shepherd God's people matters.
  - >
    The qualifications Paul lists are overwhelmingly about character, not
    talent. An elder is to be above reproach, faithful at home, and marked by
    self-control and love of what is good. The same integrity God asks of
    leaders is the integrity he is forming in all of us.
one_thing: >
  God builds his church on people of tested character, and he is forming that
  same character in every believer.

discussion_questions:
  Connecting:
    - "When you think of a leader you deeply respect, what character trait stands out first?"
    - "Why do you think we're so often drawn to charisma over character?"
  Confessing:
    - "Where is there a gap right now between who you are in public and who you are at home?"
    - "What's one area of self-control you've been avoiding?"
  Considering:
    - "In Titus 1:5-9, how many qualifications are about ability versus character?"
    - "Why might Paul start a letter about godly living with leadership?"
  Committing:
    - "What is one step toward integrity you can take this week?"
    - "Who in your life could you ask to hold you accountable in it?"

next_steps_intro: >
  As part of our annual theme, Deep & Wide, we follow up each week with a few
  simple, practical steps to help us apply the sermon.
next_steps_title: "Part 8: Titus 1"
next_steps:
  - "Identify one relationship where your private and public self don't match, and close the gap."
  - "Ask a trusted friend to check in on one area of self-control this month."
  - "Thank a leader in your life whose character has shaped your faith."
