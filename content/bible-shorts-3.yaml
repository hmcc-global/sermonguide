scripture_title: Haggai 1
scripture_passage:
- '^1 In the seventh month, on the twenty-first day of the month, the word of the Lord came by the hand
  of Haggai the prophet: ^2 “Speak now to Zerubbabel the son of Shealtiel, governor of Judah, and to Joshua
  the son of Jehozadak, the high priest, and to all the remnant of the people, and say, ^3 ‘Who is left
  among you who saw this house in its former glory? How do you see it now? Is it not as nothing in your
  eyes? ^4 Yet now be strong, O Zerubbabel, declares the Lord. Be strong, O Joshua, son of Jehozadak,
  the high priest. Be strong, all you people of the land, declares the Lord. Work, for I am with you,
  declares the Lord of hosts, ^5 according to the covenant that I made with you when you came out of Egypt.
  My Spirit remains in your midst. Fear not. ^6 For thus says the Lord of hosts: Yet once more, in a little
  while, I will shake the heavens and the earth and the sea and the dry land. ^7 And I will shake all
  nations, so that the treasures of all nations shall come in, and I will fill this house with glory,
  says the Lord of hosts. ^8 The silver is mine, and the gold is mine, declares the Lord of hosts. ^9
  The latter glory of this house shall be greater than the former, says the Lord of hosts. And in this
  place I will give peace, declares the Lord of hosts.’”'
- '^10 On the twenty-fourth day of the ninth month, in the second year of Darius, the word of the Lord
  came by Haggai the prophet, ^11 “Thus says the Lord of hosts: Ask the priests about the law: ^12 ‘If
  someone carries holy meat in the fold of his garment and touches with his fold bread or stew or wine
  or oil or any kind of food, does it become holy?’” The priests answered and said, “No.” ^13 Then Haggai
  said, “If someone who is unclean by contact with a dead body touches any of these, does it become unclean?”
  The priests answered and said, “It does become unclean.” ^14 Then Haggai answered and said, “So is it
  with this people, and with this nation before me, declares the Lord, and so with every work of their
  hands. And what they offer there is unclean. ^15 Now then, consider from this day onward. Before stone
  was placed upon stone in the temple of the Lord, ^16 how did you fare? When one came to a heap of twenty
  measures, there were but ten. When one came to the wine vat to draw fifty measures, there were but twenty.
  ^17 I struck you and all the products of your toil with blight and with mildew and with hail, yet you
  did not turn to me, declares the Lord. ^18 Consider from this day onward, from the twenty-fourth day
  of the ninth month. Since the day that the foundation of the Lord''s temple was laid, consider: ^19
  Is the seed yet in the barn? Indeed, the vine, the fig tree, the pomegranate, and the olive tree have
  yielded nothing. But from this day on I will bless you.”'
- ^20 The word of the Lord came a second time to Haggai on the twenty-fourth day of the month, ^21 “Speak
  to Zerubbabel, governor of Judah, saying, I am about to shake the heavens and the earth, ^22 and to
  overthrow the throne of kingdoms. I am about to destroy the strength of the kingdoms of the nations,
  and overthrow the chariots and their riders. And the horses and their riders shall go down, every one
  by the sword of his brother. ^23 On that day, declares the Lord of hosts, I will take you, O Zerubbabel
  my servant, the son of Shealtiel, declares the Lord, and make you like a signet ring, for I have chosen
  you, declares the Lord of hosts.”
recap:
- 'Sermon Recap Bible Shorts: Haggai 2 — Pastor Pete

  This message continued the Bible Shorts series through Haggai, picking up about a month into the rebuilding
  of the Temple. Pastor Pete briefly recapped chapter 1 — the returning exiles had been paralyzed not
  by laziness but by fear, and God''s presence was the key to moving forward. Haggai 2 delivers three
  faith encouragements: choose faith over comparison, receive God''s blessing with faith, and trust God''s
  calling by faith.'
- 'The first encouragement addresses a very human problem. A month into construction, the new Temple''s
  shape was becoming visible — and for those who remembered Solomon''s Temple in all its grandeur, what
  they were building felt like nothing. God doesn''t avoid meeting us in discouragement, but his answer
  isn''t a pep talk — it''s a reminder that what made the Temple glorious was never the architecture or
  the gold. It was the Spirit of God. Pastor Pete connected this to anyone in a life transition — graduates
  leaving a formative season, someone struggling to invest in a new church or life group — and pressed
  the real question: not whether this looks like what you remember, but whether the Spirit of God is working
  here. He traced God''s promise that "the latter glory shall be greater than the former" all the way
  to Revelation 21, where God himself is the temple. Can you trust that what looks small or disappointing
  now could be part of something far greater?'
- 'The second section uses priestly law to make a pointed observation: holiness doesn''t transmit by contact,
  but uncleanness does. Three months of temple work hadn''t made the people holy — their long rebellion
  had made everything they touched unclean. God delayed blessing even after work resumed because he was
  looking for genuine faith, not just activity. When he finally says "from this day on I will bless you,"
  it''s restored relationship, not just improved circumstances. The question for us: are we pursuing God,
  or just pursuing outcomes?'
- The final section delivers the biggest promise to the most unlikely recipient. Zerubbabel — whose name
  literally means "born in exile" — is told he will be made like a signet ring, a symbol of royal authority.
  By any human measure he was leading a ragged mission with no army, no walls, and a temple of wood and
  stone. Yet through his family line, the Messiah would come. Pastor Pete paused to address a 2026 Harvard
  study showing significant percentages of Gen Z turning to AI for relationship advice, emotional support,
  and companionship — a way of getting connection without the risk of rejection or awkwardness. But faith
  doesn't avoid fear. Faith overcomes it. Like Zerubbabel, we have a role to play in a story much larger
  than ourselves.
one_thing: Live by faith to follow God's calling.
discussion_questions:
  Connecting:
  - Have you ever gone back to a place that meant a lot to you — a hometown, a school, a favorite restaurant
    — and felt disappointed that it didn't feel the same? What was that like?
  - What's a season of life you've looked back on thinking "it will never be that good again"?
  Confessing:
  - Pastor Pete described comparison as something that keeps us from seeing and participating in what
    God is doing right now. Where in your life is comparison doing that to you — whether comparing to
    your own past or to someone else's experience?
  - He also pointed out that it's easy to engage in spiritual activity — reading the Bible, serving, praying
    — while actually just looking for results rather than seeking God. Does that land for you anywhere?
    How can you tell the difference in yourself?
  Considering:
  - In Haggai 2:3–5, God acknowledges the people's discouragement about the Temple looking small compared
    to Solomon's — but then points them to his Spirit rather than to the building. What does that tell
    us about where glory actually comes from?
  - In verses 11–14, Haggai uses the priestly law to make a point about the people's uncleanness. What
    is God looking for from the people beyond just their resumed work on the Temple — and how does verse
    19 show us what changes when he finds it?
  Committing:
  - Pastor Pete noted that fear is the constant enemy of faith, and that faith doesn't avoid fear — it
    overcomes it. What is one fear you've been quietly working around rather than walking through in faith?
  - Zerubbabel had a role to play in God's plan that looked laughably small from the outside. What role
    do you sense God has given you in this season — and what would it look like to step into it more fully
    this week?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
next_steps_title: 'Part 3: Haggai 2'
next_steps:
- Reflect honestly on where comparison has kept you from investing in what God is doing right now — a
  new community, a new season, a new calling.
- Ask God whether your current spiritual practices are about seeking him or seeking outcomes — and let
  his answer shape how you approach them this week.
- Identify one fear you've been avoiding and take one step of faith toward it rather than around it.
- Read Revelation 21:22–26 alongside Haggai 2:6–9 and let the full arc of God's plan — from a small temple
  of wood and stone to the glory that fills the new creation — fuel your faith for wherever you are right
  now.
