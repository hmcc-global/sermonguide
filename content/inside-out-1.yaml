series: INSIDE OUT
part: 'Part 1: Repentance'
order: 18
scripture_title: Psalm 51
scripture_passage:
- "^1 Have mercy on me, O God,\n    according to your steadfast love;\naccording to your abundant mercy\n\
  \    blot out my transgressions.\n^2 Wash me thoroughly from my iniquity,\n    and cleanse me from my\
  \ sin!\n^3 For I know my transgressions,\n    and my sin is ever before me.\n^4 Against you, you only,\
  \ have I sinned\n    and done what is evil in your sight,\nso that you may be justified in your words\n\
  \    and blameless in your judgment.\n^5 Behold, I was brought forth in iniquity,\n    and in sin did\
  \ my mother conceive me.\n^6 Behold, you delight in truth in the inward being,\n    and you teach me\
  \ wisdom in the secret heart.\n^7 Purge me with hyssop, and I shall be clean;\n    wash me, and I shall\
  \ be whiter than snow.\n^8 Let me hear joy and gladness;\n    let the bones that you have broken rejoice.\n\
  ^9 Hide your face from my sins,\n    and blot out all my iniquities.\n^10 Create in me a clean heart,\
  \ O God,\n    and renew a right spirit within me.\n^11 Cast me not away from your presence,\n    and\
  \ take not your Holy Spirit from me.\n^12 Restore to me the joy of your salvation,\n    and uphold me\
  \ with a willing spirit.\n^13 Then I will teach transgressors your ways,\n    and sinners will return\
  \ to you.\n^14 Deliver me from bloodguiltiness, O God,\n    O God of my salvation,\n    and my tongue\
  \ will sing aloud of your righteousness.\n^15 O Lord, open my lips,\n    and my mouth will declare your\
  \ praise.\n^16 For you will not delight in sacrifice, or I would give it;\n    you will not be pleased\
  \ with a burnt offering.\n^17 The sacrifices of God are a broken spirit;\n    a broken and contrite\
  \ heart, O God, you will not despise.\n^18 Do good to Zion in your good pleasure;\n    build up the\
  \ walls of Jerusalem;\n^19 then will you delight in right sacrifices,\n    in burnt offerings and whole\
  \ burnt offerings;\n    then bulls will be offered on your altar."
recap:
- Pastor Josh began by reflecting on the retreat and naming some unhealthy forms of faith many of us drift
  into—religious performance, sincere but immature belief, or faith driven by image and status. As God
  reveals things in us—old wounds, hidden sins, unmet longings, areas needing surrender—we’re invited
  not into shame, but into healing and renewal that happens from the inside out. Real change doesn’t come
  through self-punishment, feeling bad, or behavior modification alone, but through a life shaped by repentance—a
  posture that keeps us open to God’s grace over time.
- Using Psalm 51, Pastor Josh reframed repentance as more than regret or apology. Biblically, repentance
  means turning away from sin and turning toward God, agreeing with God about reality. David’s repentance
  only became possible when his distorted view of reality was confronted—his minimizing of sin, misuse
  of power, and pursuit of pleasure over God’s design. Psalm 51 shows that sin is not just about bad actions
  but a deeper brokenness of nature that we cannot fix ourselves. Only God can cleanse, restore joy, and
  renew the heart.
- Repentance, then, is not moving from sin to better behavior, but from sin back to God, trusting His
  mercy and kindness. God exposes sin not to humiliate us, but to heal us. Because of God’s grace—and
  ultimately through Jesus, our true sacrifice—we can confess honestly, be forgiven, and experience restored
  desires, renewed joy, and deeper relationship with Him. Life truly is better in the light than in the
  dark.
discussion_questions:
  Connecting:
  - Why do you think it’s so hard for people in general to admit they’re wrong—even about small things?
  - In movies or stories, what usually makes a character finally “wake up” to the truth about themselves?
  Confessing:
  - Where might you be tempted to soften, excuse, or redefine sin rather than see it as God does?
  - Are there beliefs about God, yourself, or life that may need to be brought into alignment with God’s
    reality?
  Considering:
  - In Psalm 51, what does David acknowledge about the nature and effects of his sin?
  - What does David believe only God can do that he cannot do for himself?
  Committing:
  - What is one way you can practice repentance as a posture, not just a moment, this week?
  - How could regular confession—to God and with trusted believers—become part of your spiritual rhythm?
