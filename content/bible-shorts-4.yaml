series: BIBLE SHORTS
part: 'Part 4: 2 John'
order: 6
date: 2026-05-10
scripture_title: 2 John
scripture_passage:
- '^1 The elder to the elect lady and her children, whom I love in truth, and not only I, but also all
  who know the truth, ^2 because of the truth that abides in us and will be with us forever:'
- ^3 Grace, mercy, and peace will be with us, from God the Father and from Jesus Christ the Father's Son,
  in truth and love.
- ^4 I rejoiced greatly to find some of your children walking in the truth, just as we were commanded
  by the Father. ^5 And now I ask you, dear lady—not as though I were writing you a new commandment, but
  the one we have had from the beginning—that we love one another. ^6 And this is love, that we walk according
  to his commandments; this is the commandment, just as you have heard from the beginning, so that you
  should walk in it. ^7 For many deceivers have gone out into the world, those who do not confess the
  coming of Jesus Christ in the flesh. Such a one is the deceiver and the antichrist. ^8 Watch yourselves,
  so that you may not lose what we have worked for, but may win a full reward. ^9 Everyone who goes on
  ahead and does not abide in the teaching of Christ, does not have God. Whoever abides in the teaching
  has both the Father and the Son. ^10 If anyone comes to you and does not bring this teaching, do not
  receive him into your house or give him any greeting, ^11 for whoever greets him takes part in his wicked
  works.
- ^12 Though I have much to write to you, I would rather not use paper and ink. Instead I hope to come
  to you and talk face to face, so that our joy may be complete.
- ^13 The children of your elect sister greet you.
recap:
- 'John’s second letter is addressed to “the elect lady and her children.” Pastor Pete noted this most
  likely refers to a real woman hosting a house church, which is how early church leaders like Clement
  of Alexandria read it. The letter circles around two themes John returns to throughout his writing:
  walking in truth and loving one another.'
- 'John opens warmly, glad to hear that members of the church are actually living out the gospel. He reminds
  them of the command they’ve had from the beginning: love one another. But love here isn’t a feeling.
  It’s an active decision to obey God and live according to his commands. Truth, obedience, and love are
  bound together and can’t be pulled apart. Pastor Pete noted that Christian maturity isn’t measured by
  knowledge alone. You can know a lot and still be immature. It’s better to be a mature dummy than an
  immature genius.'
- The letter then turns to a real threat. Former members of the church had left and were spreading teaching
  that denied the core of the faith, including that Jesus came in the flesh. John tells the church not
  to welcome these people in or even greet them. Pastor Pete explained that this isn’t a blanket instruction
  against hospitality. There’s a difference between someone with honest questions and someone actively
  trying to pull others away from Christ. The same dangers show up today in legalism, moral revisionism,
  and false prophecy — teaching that either adds to or discards what Scripture clearly says.
- 'The closing challenge was personal. The threat isn’t always a stranger at the door. Pastor Pete asked
  the congregation to consider what they voluntarily let in through screens and podcasts, and whether
  they gravitate toward teaching that is biblically faithful or teaching that confirms what they already
  want to believe. Parents especially: your kids notice what you welcome.'
one_thing: Practice truth and love to protect your spiritual family.
discussion_questions:
  Connecting:
  - If you had to describe your relationship with "rules" in one word, what would it be?
  - What's a piece of advice you've heard so many times it almost stopped meaning anything?
  Confessing:
  - Where is there a gap between what you know the Bible says and how you're actually living it out?
  - What voices or influences are you regularly welcoming into your life that you've never really examined?
  Considering:
  - In verses 5-6, how does John define love, and how does that compare to how our culture usually uses
    the word?
  - What does verse 9 warn about when it comes to "going on ahead" beyond the teaching of Christ?
  Committing:
  - Who in your community do you need to love more actively this week, not just feel warmly toward?
  - What is one step you can take to make sure the teaching you're consuming is biblically grounded rather
    than just personally comfortable?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
next_steps_title: 'Part 4: 2 John'
next_steps:
- 'Audit one podcast, account, or teacher you follow regularly and ask: is this anchored in scripture
  or does it tell me what I want to hear?'
- Practice one concrete act of love this week that costs you something.
- Read 1 John alongside 2 John to get the fuller picture of what John means by walking in truth and love.
