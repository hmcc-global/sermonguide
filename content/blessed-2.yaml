series: BLESSED
part: 'Part 2: Free From The Curse'
order: 34
date: 2025-10-26
scripture_title: Galatians 3:7–14
preacher: Pastor Pete Dahlem
scripture_passage:
- ^7 Know then that it is those of faith who are the sons of Abraham. ^8 And the Scripture, foreseeing
  that God would justify the Gentiles by faith, preached the gospel beforehand to Abraham, saying, “In
  you shall all the nations be blessed.” ^9 So then, those who are of faith are blessed along with Abraham,
  the man of faith. ^10 For all who rely on works of the law are under a curse; for it is written, “Cursed
  be everyone who does not abide by all things written in the Book of the Law, and do them.” ^11 Now it
  is evident that no one is justified before God by the law, for “The righteous shall live by faith.”
  ^12 But the law is not of faith, rather “The one who does them shall live by them.” ^13 Christ redeemed
  us from the curse of the law by becoming a curse for us—for it is written, “Cursed is everyone who is
  hanged on a tree”— ^14 so that in Christ Jesus the blessing of Abraham might come to the Gentiles, so
  that we might receive the promised Spirit through faith.
recap:
- This week, Pastor Pete continued our Blessed series with a message from Galatians 3:7–14 on what it
  means to be free from the curse. From the very beginning, God’s creation was wrapped in blessing, but
  when Adam and Eve disobeyed, sin entered the world and with it came curses—pain, broken relationships,
  toil, death, and separation from God. Ever since, humanity has lived under the shadow of the curse,
  seeking substitute blessings through performance, approval, or possessions. Yet even in the garden,
  God promised that He would not abandon His people under the curse, but would send one to crush the serpent
  and restore blessing.
- Paul reminds us that the law, while good, could never lift the curse, because no one could keep it perfectly.
  But Christ redeemed us by becoming a curse for us on the cross. In His cry, “My God, my God, why have
  you forsaken me?” Jesus bore the full weight of sin’s curse—separation from God, loss of identity, and
  shame—so that we could be set free. Now, by faith, we receive the blessing promised to Abraham and the
  gift of the Spirit who testifies that we are God’s children. The curse no longer has power over those
  who belong to Christ.
- Our call, then, is to stop agreeing with the lies and accusations of curses—whether from others, from
  ourselves, or from the enemy—and to live in the freedom of God’s blessing. Through prayer, confession,
  and worship, we experience the reality of our redemption and walk in the Spirit’s power. The
one_thing: the curse is powerless for those who are in Christ.
discussion_questions:
  Connecting:
  - What’s one small thing that recently gave you a sense of joy, peace, or relief in the middle of a
    busy week?
  - When you were younger, what was something you most wanted to hear from a parent, teacher, or coach?
  Considering:
  - In Galatians 3:13, Paul says Christ “became a curse for us.” What does this reveal about the depth
    of God’s love?
  - How does receiving God’s blessing through faith differ from trying to earn blessing through performance
    or obedience to the law?
  Confessing:
  - What are some “curses” or accusations (from others, from yourself, or from the enemy) that you’ve
    been tempted to believe about your identity?
  - In what areas of your life do you most struggle to trust that Christ has already set you free?
  Committing:
  - What is one lie or curse you can reject this week by replacing it with a truth from Scripture?
  - How can you intentionally live as a “blessed child of God” in your relationships, work, or community
    this week?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
