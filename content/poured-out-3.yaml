series: Poured Out
part: 'Part 3: Pastor David YANG'
order: 27
recap:
- 'This Sunday, Pastor David Yang shared a passionate and personal message on “Poured Out: Missions” from
  Matthew 28:16–20, calling the church to rediscover God’s heartbeat for the nations. With warmth and
  humor, he reminded us that missions is not for “super Christians,” but for all who follow Jesus. From
  Genesis to Revelation, Scripture reveals a missionary God—one who sent His Son to seek and save the
  lost, and who now sends us to carry that same message to every people group on earth. Pastor Yang emphasized
  that Jesus’ Great Commission rests on three promises: His authority, His presence, and His call to all
  nations.'
- 'He shared remarkable stories of God’s power at work among unreached people groups—from poisoned cups
  that couldn’t harm believers, to dreams leading Muslims to Christ, to miraculous healings and churches
  rising in once-hostile lands. Through these testimonies, Pastor Yang reminded us that God’s authority
  extends over every nation, every leader, and every obstacle. Even when the cost is high, God’s promise
  stands: “I am with you always, to the end of the age.” Missions, he said, is not just an event or trip—it’s
  a lifestyle of surrender, faith, and obedience. The sermon ended with a powerful challenge: we have
  only one life—will we waste it, spend it, or invest it for eternity?'
- The
one_thing: Invest your life in what has eternal value — the mission of God among all nations.
discussion_questions:
  Connecting:
  - Have you ever met a missionary or heard a story that inspired or surprised you?
  - If you could visit any country in the world, which would you choose — and what would you want to see
    or experience there?
  Confessing:
  - What fears or assumptions might make missions feel intimidating or “not for me”?
  - Are there ways you’ve been holding back from fully trusting God’s authority or presence in your own
    calling?
  Considering:
  - Pastor Yang said, “God is a missionary God.” What does that reveal about His character and heart?
  - How do the stories Pastor Yang shared show God’s power and presence in places where people have never
    heard the gospel?
  Committing:
  - What would it look like for you to invest your life — not just spend it — for something of eternal
    value?
  - What is one next step you can take this month to join God’s mission (e.g., pray for an unreached people
    group, give to missions, talk to someone about your faith, or consider going)?
