series: DEEP WORK
part: 'Part 1: DEEPER LIFE'
order: 22
date: 2026-01-18
scripture_title: Luke 10:38-42
scripture_passage:
- ^38 Now as they went on their way, Jesus entered a village. And a woman named Martha welcomed him into
  her house. ^39 And she had a sister called Mary, who sat at the Lord's feet and listened to his teaching.
  ^40 But Martha was distracted with much serving. And she went up to him and said, “Lord, do you not
  care that my sister has left me to serve alone? Tell her then to help me.” ^41 But the Lord answered
  her, “Martha, Martha, you are anxious and troubled about many things, ^42 but one thing is necessary.
  Mary has chosen the good portion, which will not be taken away from her.”
recap:
- Pastor Pete opened the new year by inviting the church into a season of Deep & Wide, emphasizing that
  deep spiritual growth requires intentional preparation. Drawing from Deep Work by Cal Newport, he reminded
  us that just as deep focus is increasingly rare and valuable in our economy, deep attention to God is
  increasingly rare—and essential—for spiritual transformation. Shallow spirituality cannot produce deep
  change. The question before us is not simply can we grow deeper, but do we want to, and are we willing
  to give Jesus our focused attention?
- 'Turning to Luke 10:38–42, Pastor Pete highlighted the contrast between Martha and Mary. Martha welcomed
  Jesus and served faithfully, yet she became distracted, anxious, and resentful. Her service—good in
  itself—had subtly replaced intimacy with Jesus rather than flowing from it. Mary, on the other hand,
  chose to sit at Jesus’ feet, giving Him her undivided attention. Jesus’ gentle correction reveals His
  heart: “One thing is necessary.” Fruitful servanthood and kingdom impact must be rooted in deep abiding,
  not driven by distraction or self-focus.'
- 'The sermon pressed deeper into the roots of distraction—overstimulation, avoidance, and even rebellion.
  In a world that constantly informs, entertains, markets, and manipulates us, distraction often becomes
  a way to avoid pain, fear, or conviction. Yet Jesus invites us to choose “the good portion”: deeper
  intimacy that brings peace, clarity, and life. This month, God is calling our church to make room—to
  slow down, embrace silence and solitude, and give our attention back to Jesus. A deeper life with God
  begins with deeper attention to Him.'
discussion_questions:
  Connecting:
  - What’s one habit or routine that helps you feel more focused (even outside of spiritual things)?
  - When your schedule gets full, what’s usually the first thing that gets squeezed out?
  Confessing:
  - Where does distraction most often pull your attention away from Jesus right now?
  - Are there areas where busyness, avoidance, or resistance might be keeping you from listening to God?
  - Are you more naturally a “Mary” (listener) or a “Martha” (doer) in everyday life?
  Considering:
  - In Luke 10:38–42, what words or phrases show the difference in Mary’s and Martha’s attention toward
    Jesus?
  - How does Jesus describe Martha’s inner state, and how does that contrast with Mary’s posture?
  - What does Jesus mean when He says Mary has chosen “the good portion”?
  Committing:
  - What is one small, realistic way you can give Jesus more focused attention this week?
  - Which practice—slowness, solitude, or silence—do you sense God inviting you to lean into this season?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
