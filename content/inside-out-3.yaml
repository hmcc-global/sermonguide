series: INSIDE OUT
part: 'Part 3: Thankfulness'
order: 16
date: 2026-03-01
scripture_title: 1 Thessalonians 5:16-18
preacher: Pastor Pete Dahlem
scripture_passage:
- ^16 Rejoice always, ^17 pray without ceasing, ^18 give thanks in all circumstances; for this is the
  will of God in Christ Jesus for you.
recap:
- Pastor Pete continued the Inside Out series by asking how deep transformation truly happens. After surrender,
  the next shaping force of the heart is thankfulness. In 1 Thessalonians 5:16–18, Paul commands believers
  to rejoice always, pray without ceasing, and give thanks in all circumstances. This is not shallow positivity
  or forced optimism. It is the will of God in Christ Jesus for us. Thankfulness is both the goal of spiritual
  maturity and the means by which we grow into it. A grateful heart reflects a life rooted in Christ.
- 'But life is not simple or stable. Pastor Pete illustrated this through the story of Punch, the baby
  monkey—abandoned, attacked, comforted, restored. Our lives can feel like that emotional rollercoaster.
  If our gratitude depends on circumstances, it will rise and fall with them. True thankfulness comes
  from deeper convictions: recognizing our dependence on God, trusting His character, remembering His
  grace, holding an eternal perspective, and believing He is sanctifying us even through suffering. We
  are not called to give thanks for all circumstances, but in them—because we know who God is.'
- Christian thankfulness is not rooted in feelings but in truth. Hebrews reminds us that Christ upholds
  the universe by His word. Romans tells us suffering produces endurance, character, and hope. Colossians
  calls us to let the peace of Christ rule and to be thankful. Gratitude overflows when our lives are
  rooted in Christ. As we fix our eyes on His grace, thankfulness becomes the natural posture of our hearts—even
  in adversity.
discussion_questions:
  Connecting:
  - Why do people often find it easier to complain than to give thanks?
  - What small everyday things are easy to overlook but actually worth appreciating?
  Confessing:
  - Where does your gratitude tend to fluctuate most—when life is busy, stressful, disappointing, or uncertain?
  - What circumstances currently make thankfulness difficult for you?
  Considering:
  - In 1 Thessalonians 5:16–18, how are rejoicing, prayer, and thankfulness connected?
  - What does Paul mean by giving thanks “in all circumstances,” and how is that different from “for all
    circumstances”?
  Committing:
  - What practical rhythm (daily prayer, journaling, shared gratitude, Scripture meditation) can you adopt
    to cultivate thankfulness?
  - How can you intentionally express gratitude within the church community this week?
