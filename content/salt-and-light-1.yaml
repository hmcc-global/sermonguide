series: SALT & LIGHT
part: 'Part 1: STEWARDSHIP'
order: 14
date: 2026-03-15
scripture_title: 1 Timothy 6:17-19
preacher: Pastor Sam Beck
scripture_passage:
- ^17 As for the rich in this present age, charge them not to be haughty, nor to set their hopes on the
  uncertainty of riches, but on God, who richly provides us with everything to enjoy. ^18 They are to
  do good, to be rich in good works, to be generous and ready to share, ^19 thus storing up treasure for
  themselves as a good foundation for the future, so that they may take hold of that which is truly life.
recap:
- Pastor Sam introduced the new Salt & Light sermon series as an extension of the church’s larger theme
  of Deep & Wide. As the gospel transforms our lives deeply, it should also spread widely through the
  way we live and interact with the world. From 1 Timothy 6:17–19, Pastor Sam highlighted the central
  idea that while many people strive to become financially rich, God’s desire is that His children become
  rich in good works.
- Paul’s instructions in this passage are directed toward the “rich,” but Pastor Sam helped us see that
  by biblical standards this includes most of us. In the ancient world, having abundance beyond basic
  needs could qualify someone as rich, and many today fall into that category even if they don’t feel
  wealthy. Yet the purpose of this passage is not to create guilt, but to reveal God’s heart for His children.
  God wants them to be humble, recognizing that wealth and opportunity ultimately come from Him; secure,
  placing their hope not in the uncertainty of riches but in God; and content, rightly enjoying the good
  gifts He provides. Stewardship begins with trusting the goodness of our heavenly Father.
- 'Because of this, God calls His people to do good, be rich in good works, and be generous and ready
  to share. These good works are meant to be expressed in several spheres of life: caring for our families,
  serving and supporting God’s family, the church, and doing good toward our neighbors and communities.
  Ultimately, generosity helps us loosen our grip on possessions so that we can take hold of “that which
  is truly life.” The gospel reminds us why this is possible. We were once spiritually bankrupt and separated
  from God, but through Christ we have received every spiritual blessing. Because God has been richly
  generous toward us, we are now called to reflect His goodness by living lives that are rich in good
  works.'
discussion_questions:
  Connecting:
  - Why do you think most people can easily name someone richer than themselves, but rarely think of themselves
    as rich?
  - When you hear the word stewardship, what kinds of things or images come to mind?
  Considering:
  - In 1 Timothy 6:17–19, what attitudes does Paul warn the rich about, and what actions does he encourage
    instead?
  - What reasons does Paul give for being generous and rich in good works?
  Confessing:
  - 'Which is more difficult for you right now: humility, security, contentment, or generosity?'
  - Where are you most tempted to place your hope in money or possessions rather than in God?
  Committing:
  - What is one practical way you can be rich in good works this week toward your family, church, or neighbors?
  - How might God be inviting you to use your resources, abilities, or opportunities more intentionally
    for His purposes?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
