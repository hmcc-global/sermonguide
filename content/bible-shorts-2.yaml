series: BIBLE SHORTS
part: 'Part 2: HAGGAI 1'
order: 8
scripture_title: Haggai 1
scripture_passage:
- '^1 In the second year of Darius the king, in the sixth month, on the first day of the month, the word
  of the Lord came by the hand of Haggai the prophet to Zerubbabel the son of Shealtiel, governor of Judah,
  and to Joshua the son of Jehozadak, the high priest: ^2 “Thus says the Lord of hosts: These people say
  the time has not yet come to rebuild the house of the Lord.” ^3 Then the word of the Lord came by the
  hand of Haggai the prophet, ^4 “Is it a time for you yourselves to dwell in your paneled houses, while
  this house lies in ruins? ^5 Now, therefore, thus says the Lord of hosts: Consider your ways. ^6 You
  have sown much, and harvested little. You eat, but you never have enough; you drink, but you never have
  your fill. You clothe yourselves, but no one is warm. And he who earns wages does so to put them into
  a bag with holes.

  ^7 “Thus says the Lord of hosts: Consider your ways. ^8 Go up to the hills and bring wood and build
  the house, that I may take pleasure in it and that I may be glorified, says the Lord. ^9 You looked
  for much, and behold, it came to little. And when you brought it home, I blew it away. Why? declares
  the Lord of hosts. Because of my house that lies in ruins, while each of you busies himself with his
  own house. ^10 Therefore the heavens above you have withheld the dew, and the earth has withheld its
  produce. ^11 And I have called for a drought on the land and the hills, on the grain, the new wine,
  the oil, on what the ground brings forth, on man and beast, and on all their labors.”

  ^12 Then Zerubbabel the son of Shealtiel, and Joshua the son of Jehozadak, the high priest, with all
  the remnant of the people, obeyed the voice of the Lord their God, and the words of Haggai the prophet,
  as the Lord their God had sent him. And the people feared the Lord. ^13 Then Haggai, the messenger of
  the Lord, spoke to the people with the Lord''s message, “I am with you, declares the Lord.” ^14 And
  the Lord stirred up the spirit of Zerubbabel the son of Shealtiel, governor of Judah, and the spirit
  of Joshua the son of Jehozadak, the high priest, and the spirit of all the remnant of the people. And
  they came and worked on the house of the Lord of hosts, their God, ^15 on the twenty-fourth day of the
  month, in the sixth month, in the second year of Darius the king.'
recap:
- 'This message continued the Bible Shorts series — a journey through shorter, often-overlooked books
  of Scripture — this time landing in the Minor Prophets with Haggai chapter 1. Pastor Pete set the historical
  scene: after decades of exile in Babylon due to Israel''s idolatry and disobedience, King Cyrus of Persia
  allowed the Jewish people to return to Jerusalem in 538 BC under the leadership of Zerubbabel the governor
  and Joshua the high priest. Only about 5% of the Jewish exiles chose to make the journey back — a genuine
  act of faith, given the danger and difficulty involved. They returned, laid the foundation of the Temple,
  and then... stopped. For 16 years, construction sat dormant. In 520 BC, God sent the prophet Haggai
  to get things moving again.'
- 'The key phrase in the chapter — repeated twice — is "consider your ways." God wasn''t calling out laziness
  or indifference. Pastor Pete was careful to note that these returning exiles were actually brave people
  who had already taken enormous risks. The reason they stalled wasn''t comfort; it was fear. Surrounding
  nations had actively discouraged them, bribed officials against them, and threatened opposition. So
  the people told themselves the time just wasn''t right yet. Meanwhile, they had found time to panel
  the walls of their own homes. God''s response was pointed: look at what''s actually happening. You''re
  sowing much and harvesting little. You eat but never feel full. Your earnings go into a bag with holes.
  God was frustrating their efforts to build their own lives while his house sat in ruins — not out of
  cruelty, but to get their attention. What felt safe (holding back from obeying God) was actually costing
  them everything.'
- 'Pastor Pete drew out a timeless pattern: fear is the constant enemy of faith. For some of us, the time
  to serve God always seems to be in the past — a "been there, done that" faith. For others, it''s always
  somewhere in the future — a "someday" faith. The reasons vary: fear of losing control, fear of missing
  an opportunity, fear of family tension, fear of opposition. But the invitation of the text is simply
  to stop and honestly ask — what time is it, really? Not just the date on the calendar, but what season
  is God calling you into right now?'
- 'The chapter doesn''t end in rebuke, though. When the people obeyed and feared the Lord, God''s word
  through Haggai shifted from written message to spoken voice: "I am with you." That simple promise, Pastor
  Pete explained, operates on multiple levels — having the right person with you changes everything, God
  empowers the work he calls us to, and ultimately his presence is the whole point. The Temple wasn''t
  just a building project; it was the place of God''s dwelling with his people. And within three weeks
  of that promise, the people were back at work. For us, Pastor Pete noted, the Temple is no longer a
  physical structure — each believer is a temple of the Holy Spirit, and together the church is the dwelling
  place of God in the world.'
one_thing: God's presence sets us free from fear to obey his calling.
discussion_questions:
  Connecting:
  - What's something you've had on your to-do list for an embarrassingly long time — and what's the excuse
    you keep telling yourself?
  - Have you ever psyched yourself out of doing something because the timing never felt quite right? What
    finally got you moving — or did it?
  Confessing:
  - 'Pastor Pete described two common postures: "been there, done that" faith that puts obedience in the
    past, and "someday" faith that keeps pushing it into the future. Which one do you most identify with
    right now?'
  - Is there something specific God has called you to — in your relationships, your church involvement,
    your witness — that fear has caused you to put on hold?
  Considering:
  - In Haggai 1:2–6, God asks the people to "consider your ways" and then describes a life of effort with
    little fruit. What connection is God drawing between their neglected obedience and their frustrated
    circumstances?
  - What does it tell us about God's character that his first word after the people obey in verse 12 is
    simply "I am with you" — before a single stone has been laid?
  Committing:
  - The people went from paralyzed to working within three weeks of hearing "I am with you." What would
    it look like for you to take one concrete step this week toward something you've been postponing out
    of fear?
  - How are you currently building up the church and the kingdom of God in this season of life — and is
    there a next step God might be stirring in you?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
next_steps_title: 'Part 2: Haggai'
next_steps:
- Spend some time this week genuinely "considering your ways" — ask God to show you where fear has been
  driving your decisions more than faith.
- Identify one thing God has called you to that you've been delaying, and take one tangible step toward
  it this week.
- 'Memorize or meditate on God''s promise: "I am with you" — and let that be the foundation for whatever
  he''s calling you into right now.'
- Read Ezra 4–6 alongside Haggai 1 to get the full historical picture of what the returning exiles were
  up against.
