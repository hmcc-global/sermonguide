series: DEEP WORK
part: 'Part 4: DEEPER INTIMACY'
order: 19
scripture_title: Jonah 4:1-11
scripture_passage:
- ^1 But it displeased Jonah exceedingly, and he was angry. ^2 And he prayed to the LORD and said, “O
  LORD, is not this what I said when I was yet in my country? That is why I made haste to flee to Tarshish;
  for I knew that you are a gracious God and merciful, slow to anger and abounding in steadfast love,
  and relenting from disaster. ^3 Therefore now, O LORD, please take my life from me, for it is better
  for me to die than to live.” ^4 And the LORD said, “Do you do well to be angry?” ^5 Jonah went out of
  the city and sat to the east of the city and made a booth for himself there. He sat under it in the
  shade, till he should see what would become of the city. ^6 Now the LORD God appointed a plant and made
  it come up over Jonah, that it might be a shade over his head, to save him from his discomfort. So Jonah
  was exceedingly glad because of the plant. ^7 But when dawn came up the next day, God appointed a worm
  that attacked the plant, so that it withered. ^8 When the sun rose, God appointed a scorching east wind,
  and the sun beat down on the head of Jonah so that he was faint. And he asked that he might die and
  said, “It is better for me to die than to live.” ^9 But God said to Jonah, “Do you do well to be angry
  for the plant?” And he said, “Yes, I do well to be angry, angry enough to die.” ^10 And the LORD said,
  “You pity the plant, for which you did not labor, nor did you make it grow, which came into being in
  a night and perished in a night. ^11 And should not I pity Nineveh, that great city, in which there
  are more than 120,000 persons who do not know their right hand from their left, and also much cattle?”
recap:
- 'At the midpoint of the One Desire Fast, Pastor Pete reminded us of a hard but freeing truth: behavior
  modification alone cannot produce spiritual transformation. Deep change requires deep intimacy with
  God. Using the story of Jonah—especially Jonah 4—he showed how intimacy with God grows not when we perform
  well, but when we stop running and start having honest conversations with Him. Jonah’s story is striking
  because he is a prophet who knows God’s character, yet resists God’s mercy. His anger, avoidance, and
  desire to flee expose a broken intimacy rather than a lack of knowledge.'
- 'Jonah ran from God, went “down” again and again, and would rather die than face what was happening
  in his heart. Yet God relentlessly pursued him—not to punish him, but to meet him in the very place
  he was avoiding. In chapter 4, Jonah finally prays honestly, and God responds not with condemnation,
  but with questions: “Do you do well to be angry?” Through the plant, the worm, and the scorching wind,
  God patiently exposes Jonah’s misplaced compassion and reshapes his perspective. Jonah’s struggle is
  deeply human—anger, resentment, grief, fear, and pain are often the very things we avoid bringing to
  God.'
- The sermon concluded with hope grounded in the gospel. We can bring our deepest struggles to God with
  confidence because Jesus is the greater Jonah. Where Jonah resisted descent, Jesus willingly entered
  suffering and death for us. Prayer, then, is not about changing God’s mind, but about allowing Him to
  change our hearts. Deeper intimacy begins when we stop running, listen honestly, and let God ask us
  the hard questions that lead to healing and transformation.
discussion_questions:
  Connecting:
  - When something frustrates you, are you more likely to vent about it, joke about it, or distract yourself
    with something else?
  - What’s a small thing that can noticeably improve your mood when a day isn’t going well?
  Confessing:
  - What kinds of emotions or topics do you tend to avoid bringing to God in prayer?
  - In what ways do you sometimes want God to change circumstances rather than change your heart?
  Considering:
  - What emotions and attitudes does Jonah express toward God in Jonah 4:1–4?
  - How does God use the plant, worm, and wind to reveal Jonah’s priorities and perspective?
  Committing:
  - What is one honest conversation you need to have with God this week?
  - How can you practice listening to God in prayer, not just speaking to Him?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
