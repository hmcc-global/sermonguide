one_thing: 'Live out of the identity that Christ gave His life to give you.

  This week, Pastor [Name] continued our Blessed series with a message on Identity from Philippians 3:4–7.
  In this passage, Paul lays out an impressive list of credentials—his heritage, education, achievements,
  and zeal—only to declare that all of it is “loss for the sake of Christ.” His words challenge how we
  define ourselves. For some, like Paul, identity is shaped by traditional culture—by family, community,
  and fulfilling expectations. For others, identity is a modern project—constructed through self-expression,
  performance, and authenticity. Both can become heavy burdens: one chained to obligation, the other to
  endless self-creation.


  But Paul points to a third way—a biblical identity rooted not in what we do or who we impress, but in
  who God is and what He has done for us. Our true identity is created by God, redeemed by Christ, and
  blessed in community and mission. God intentionally formed us, Jesus purchased our freedom and purpose,
  and the Holy Spirit sends us out as part of His family and calling. When we live out of this identity,
  we are no longer enslaved to comparison or performance. We become people who know whose we are—free
  to bless others and to live with joy and security in God’s story.


  The call this week is to immerse ourselves in that story—to see our lives not as self-made projects,
  but as chapters written by a loving Author. We can live boldly and generously when we know that the
  same Christ who gave His life for us also gave us a new name, a new family, and a new purpose. The one
  thing: Live out of the identity that Christ gave His life to give you.'
discussion_questions:
  Connecting:
  - When you think about the word identity, what are some things that immediately come to mind?
  - Who in your life has helped you see yourself the way God sees you?
  Confessing:
  - What are some ways you’ve based your sense of worth on performance, approval, or comparison?
  - What part of your identity do you find hardest to surrender to Christ’s definition of who you are?
  Considering:
  - In Philippians 3:4–7, what was Paul’s old source of identity, and why did he come to see it as loss?
  - How does a biblical identity—created by God, redeemed by Christ, and blessed in community—differ from
    both traditional and modern views of identity?
  Committing:
  - What is one practical way you can live more confidently out of your identity in Christ this week?
  - How can you help someone else discover or strengthen their identity in Christ within your community?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
