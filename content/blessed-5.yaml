scripture_title: Philippians 3:4b-7
preacher: Pastor Pete Dahlem
scripture_passage:
- '4b If anyone else thinks he has reason for confidence in the flesh, I have more: ^5 circumcised on
  the eighth day, of the people of Israel, of the tribe of Benjamin, a Hebrew of Hebrews; as to the law,
  a Pharisee; ^6 as to zeal, a persecutor of the church; as to righteousness under the law, blameless.
  ^7 But whatever gain I had, I counted as loss for the sake of Christ.'
recap:
- 'This week, Pastor Pete continued our Blessed series with a message on Identity from Philippians 3:4–7.
  In this passage, Paul lays out an impressive list of credentials—his heritage, education, achievements,
  and zeal—only to declare that all of it is “loss for the sake of Christ.” His words challenge how we
  define ourselves. For some, like Paul, identity is shaped by traditional culture—by family, community,
  and fulfilling expectations. For others, identity is a modern project—constructed through self-expression,
  performance, and authenticity. Both can become heavy burdens: one chained to obligation, the other to
  endless self-creation.'
- But Paul points to a third way—a biblical identity rooted not in what we do or who we impress, but in
  who God is and what He has done for us. Our true identity is created by God, redeemed by Christ, and
  blessed in community and mission. God intentionally formed us, Jesus purchased our freedom and purpose,
  and the Holy Spirit sends us out as part of His family and calling. When we live out of this identity,
  we are no longer enslaved to comparison or performance. We become people who know whose we are—free
  to bless others and to live with joy and security in God’s story.
- The call this week is to immerse ourselves in that story—to see our lives not as self-made projects,
  but as chapters written by a loving Author. We can live boldly and generously when we know that the
