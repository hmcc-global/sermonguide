series: BLESSED
part: 'Part 4: Assurance'
order: 31
date: 2025-11-16
scripture_title: 1 John 4:13-19
preacher: Pastor Pete Dahlem
scripture_passage:
- '^13 This is how we know that we live in him and he in us: He has given us of his Spirit. ^14 And we
  have seen and testify that the Father has sent his Son to be the Savior of the world. ^15 If anyone
  acknowledges that Jesus is the Son of God, God lives in them and they in God. ^16 And so we know and
  rely on the love God has for us.

  God is love. Whoever lives in love lives in God, and God in them. ^17 This is how love is made complete
  among us so that we will have confidence on the day of judgment: In this world we are like Jesus. ^18
  There is no fear in love. But perfect love drives out fear, because fear has to do with punishment.
  The one who fears is not made perfect in love.'
- ^19 We love because he first loved us.
recap:
- This week, Pastor Pete continued our Blessed series with a message on Assurance from 1 John 4:13–19.
  Many believers know the gospel in their heads yet struggle to live in the confidence of God’s love.
  We often doubt whether we’re good enough, fear failure or rejection, and focus more on our inadequacies
  than on God’s grace. But Scripture reminds us that assurance is not based on our performance—it’s grounded
  in God’s character. We can know that we abide in Him because He has given us His Spirit, sent His Son
  as our Savior, and sealed us with His promise. The Holy Spirit confirms our adoption as children of
  God, and our confession of faith is both a declaration of belonging and a source of strength.
- John goes on to show that assurance flows from God’s very nature—God is love. His love is not just an
  emotion or an act, but His very being. This love, hesed (faithful covenant love) and agape (sacrificial,
  unconditional love), gives us confidence to stand before God without fear. Perfect love casts out fear
  because fear is rooted in punishment and shame, and Jesus bore that punishment for us. Across generations,
  we try to manage shame in different ways—by hiding it, reframing it, joking about it, or seeking validation—but
  only God’s love can truly heal it.
- When we rest in His unfailing love, we are set free from the fear of failure and the need to prove ourselves.
  We become people who love because He first loved us. The
one_thing: We are blessed with God’s assurance so that we can boldly go deeper and wider.
discussion_questions:
  Connecting:
  - What’s something recently that made you feel uncertain or anxious, and how did you respond?
  - Can you think of someone in your life whose quiet confidence in God has encouraged you? What stood
    out to you about them?
  Considering:
  - According to 1 John 4:13–19, what gives believers assurance that we abide in God and He abides in
    us?
  - What does it mean that “perfect love casts out fear”? How does that truth change how we view failure,
    shame, or judgment?
  Confessing:
  - What fears or insecurities make it hardest for you to trust that God truly loves and accepts you?
  - How have you tried to manage shame or seek approval apart from God’s love?
  Committing:
  - What’s one step you can take this week to rest in God’s assurance rather than your own performance?
  - How can you reflect God’s confident, unconditional love to someone else in your relationships, workplace,
    or community?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
