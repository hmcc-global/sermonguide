series: ADORE
part: 'Part 4: WORSHIP WITH DEVOTION'
order: 23
date: 2026-01-11
scripture_title: Matthew 2:1-12
preacher: Pastor Josh Yang
scripture_passage:
- '^1 Now after Jesus was born in Bethlehem of Judea in the days of Herod the king, behold, wise men from
  the east came to Jerusalem, ^2 saying, “Where is he who has been born king of the Jews? For we saw his
  star when it rose and have come to worship him.” ^3 When Herod the king heard this, he was troubled,
  and all Jerusalem with him; ^4 and assembling all the chief priests and scribes of the people, he inquired
  of them where the Christ was to be born. ^5 They told him, “In Bethlehem of Judea, for so it is written
  by the prophet:'
- "^6 “‘And you, O Bethlehem, in the land of Judah,\n    are by no means least among the rulers of Judah;\n\
  for from you shall come a ruler\n    who will shepherd my people Israel.’”"
- ^7 Then Herod summoned the wise men secretly and ascertained from them what time the star had appeared.
  ^8 And he sent them to Bethlehem, saying, “Go and search diligently for the child, and when you have
  found him, bring me word, that I too may come and worship him.” ^9 After listening to the king, they
  went on their way. And behold, the star that they had seen when it rose went before them until it came
  to rest over the place where the child was. ^10 When they saw the star, they rejoiced exceedingly with
  great joy. ^11 And going into the house, they saw the child with Mary his mother, and they fell down
  and worshiped him. Then, opening their treasures, they offered him gifts, gold and frankincense and
  myrrh. ^12 And being warned in a dream not to return to Herod, they departed to their own country by
  another way.
recap:
- 'In Adore, we’ve been learning what it looks like to worship Christ with faith, presence, and hope—and
  this week Pastor Josh brought it home with devotion. From Matthew 2:1–12, he framed the Magi’s journey
  as a picture of God’s initiative: God calls people to Christ, even outsiders, even through unexpected
  means. The star may have gotten the Magi moving, but it was the Word that finally directed them to Bethlehem—reminding
  us that God doesn’t merely give us vague spiritual impressions; He reveals Jesus clearly through Scripture.
  And the King they’re sent to isn’t a tyrant like Herod. He’s the promised Shepherd-King, a ruler who
  cares for and sacrifices Himself for His people.'
- 'The sermon contrasted two responses to Jesus: the Magi, who rejoice and bow in worship, and Herod,
  who is “troubled” because Jesus threatens his kingdom. Pastor Josh pressed the question: Does Jesus
  threaten your kingdom? Sometimes what looks like “low devotion” isn’t just busyness or mood—it’s that
  we’re clinging to control, comfort, and self-rule. Yet Jesus doesn’t ignore our grief or suffering;
  He meets us in it, present and compassionate, and promises that suffering will end one day under His
  perfect reign. The Magi’s “exceeding joy” and costly gifts show that devotion isn’t cold religious duty—it’s
  wholehearted, joyful surrender to the One who is truly worthy. If they worshiped like that with only
  partial understanding, how much more should we—who know the cross, resurrection, and coming restoration—offer
  Him not just something, but everything.'
discussion_questions:
  Connecting:
  - What’s one thing you’ve found yourself deeply devoted to lately—something that gets your attention,
    time, money, or emotional energy easily?
  - When you think about “devotion,” does it feel more like warm affection, gritty commitment, or religious
    duty—and why?
  Considering:
  - In Matthew 2:1–12, what specific actions show the Magi’s purpose and posture toward Jesus (look for
    verbs like “came,” “rejoiced,” “fell down,” “offered”)?
  - What contrasts does Matthew highlight between the Magi and Herod (emotions, motives, secrecy vs. openness,
    worship vs. control)?
  Confessing:
  - Where is Jesus currently “threatening your kingdom”—your control, comfort, reputation, or plans—and
    how have you resisted Him there?
  - What temporary thing have you been placing your hope or devotion in that you need to release back
    to Christ?
  Committing:
  - What is one concrete way you will respond this week with wholehearted devotion—not just admiration,
    but surrender?
  - What would it look like to “go another way” (like the Magi) in your daily life—changing a pattern
    because Jesus is King?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
