recap:
- 'This week, Pastor Pete Dahlem opened our Adore Advent series with the message “Worship with Faith”
  from Luke 1:26–55. He contrasted the spirit of Thanksgiving—celebrating harvest, abundance, and visible
  results—with Advent, a season of anticipation, waiting, and “not yet received.” While Thanksgiving celebrates
  what we have, Advent teaches us to worship in what we hope for. Looking at Mary, a young, betrothed
  Galilean woman suddenly confronted with a world-shaking call, Pastor Pete showed how God’s promises
  can land on ordinary people in very costly, confusing ways. Mary’s initial response was honest—“How
  will this be?”—but she ultimately surrendered in faith: “Behold, I am the servant of the Lord; let it
  be to me according to your word.”'
- 'We then saw how God confirmed His promises through Elizabeth, who blessed Mary and declared, “Blessed
  is she who believed that there would be a fulfillment of what was spoken to her from the Lord.” Mary’s
  response was not self-protection, but worship. In the Magnificat, she magnifies the Lord, rejoices in
  God her Savior, and praises Him for His faithfulness from generation to generation—bringing down the
  proud, lifting up the humble, filling the hungry, and remembering His promises to Israel. Pastor Pete
  reminded us that worship shifts our eyes off our limitations and onto God’s character, especially in
  seasons when we don’t yet see the outcome. In Advent and in our everyday lives, we’re invited to respond
  like Mary: not by fully understanding, but by fully trusting.'
- The
one_thing: Worship with faith that God is true to his promises.
discussion_questions:
  Connecting:
  - When you think about Advent, what emotions or memories come to mind—excitement, stress, nostalgia,
    longing? Why?
  - Can you think of a time when someone else’s faith—like Elizabeth’s—encouraged or strengthened your
    own?
  Confessing:
  - When God calls you into something hard, unknown, or costly, are you more likely to respond with “How
    will this be?” or “Let it be to me according to your word”—and why?
  - Where are you currently more focused on your own limitations, reputation, or comfort than on God’s
    promises and character?
  Considering:
  - What stands out to you about Mary’s response to God’s call compared to Eve or Sarah? What is different
    about her faith?
  - How does Mary’s song (Luke 1:46–55) shape your view of who God is and what He cares about?
  Committing:
  - What is one concrete way you can integrate worship into your daily or weekly rhythm this Advent (e.g.,
    a song, a psalm, a short evening liturgy)?
  - Who is one person you can encourage—like Elizabeth encouraged Mary—by reminding them of God’s promises
    this week?
  - What is one specific area of struggle or uncertainty where you will choose to respond with worship
    and trust that “nothing will be impossible with God”?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
