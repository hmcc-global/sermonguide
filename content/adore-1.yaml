series: ADORE
part: 'Part 1: WORSHIP WITH FAITH'
order: 26
date: 2025-12-21
scripture_title: Luke 1:26-55
preacher: Pastor Pete Dahlem
scripture_passage:
- '^26 In the sixth month the angel Gabriel was sent from God to a city of Galilee named Nazareth, ^27
  to a virgin betrothed to a man whose name was Joseph, of the house of David. And the virgin''s name
  was Mary. ^28 And he came to her and said, “Greetings, O favored one, the Lord is with you!” ^29 But
  she was greatly troubled at the saying, and tried to discern what sort of greeting this might be. ^30
  And the angel said to her, “Do not be afraid, Mary, for you have found favor with God. ^31 And behold,
  you will conceive in your womb and bear a son, and you shall call his name Jesus. ^32 He will be great
  and will be called the Son of the Most High. And the Lord God will give to him the throne of his father
  David, ^33 and he will reign over the house of Jacob forever, and of his kingdom there will be no end.”

  ^34 And Mary said to the angel, “How will this be, since I am a virgin?”

  ^35 And the angel answered her, “The Holy Spirit will come upon you, and the power of the Most High
  will overshadow you; therefore the child to be born will be called holy—the Son of God. ^36 And behold,
  your relative Elizabeth in her old age has also conceived a son, and this is the sixth month with her
  who was called barren. ^37 For nothing will be impossible with God.” ^38 And Mary said, “Behold, I am
  the servant of the Lord; let it be to me according to your word.” And the angel departed from her.'
- ^39 In those days Mary arose and went with haste into the hill country, to a town in Judah, ^40 and
  she entered the house of Zechariah and greeted Elizabeth. ^41 And when Elizabeth heard the greeting
  of Mary, the baby leaped in her womb. And Elizabeth was filled with the Holy Spirit, ^42 and she exclaimed
  with a loud cry, “Blessed are you among women, and blessed is the fruit of your womb! ^43 And why is
  this granted to me that the mother of my Lord should come to me? ^44 For behold, when the sound of your
  greeting came to my ears, the baby in my womb leaped for joy. ^45 And blessed is she who believed that
  there would be a fulfillment of what was spoken to her from the Lord.”
