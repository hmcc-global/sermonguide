series: ADORE
part: 'Part 2: WORSHIP WITH PRESENCE'
order: 25
date: 2025-12-28
scripture_title: Luke 2:1-20
preacher: Pastor Pete Dahlem
scripture_passage:
- In those days a decree went out from Caesar Augustus that all the world should be registered. ^2
  This was the first registration when Quirinius was governor of Syria. ^3 And all went to be registered,
  each to his own town. ^4 And Joseph also went up from Galilee, from the town of Nazareth, to Judea,
  to the city of David, which is called Bethlehem, because he was of the house and lineage of David, ^5
  to be registered with Mary, his betrothed, who was with child. ^6 And while they were there, the time
  came for her to give birth. ^7 And she gave birth to her firstborn son and wrapped him in swaddling
  cloths and laid him in a manger, because there was no place for them in the inn.
- "^8 And in the same region there were shepherds out in the field, keeping watch over their flock by\
  \ night. ^9 And an angel of the Lord appeared to them, and the glory of the Lord shone around them,\
  \ and they were filled with great fear. ^10 And the angel said to them, “Fear not, for behold, I bring\
  \ you good news of great joy that will be for all the people. ^11 For unto you is born this day in the\
  \ city of David a Savior, who is Christ the Lord. ^12 And this will be a sign for you: you will find\
  \ a baby wrapped in swaddling cloths and lying in a manger.” ^13 And suddenly there was with the angel\
  \ a multitude of the heavenly host praising God and saying,\n^14 “Glory to God in the highest,\n   \
  \ and on earth peace among those with whom he is pleased!”\n^15 When the angels went away from them\
  \ into heaven, the shepherds said to one another, “Let us go over to Bethlehem and see this thing that\
  \ has happened, which the Lord has made known to us.” ^16 And they went with haste and found Mary and\
  \ Joseph, and the baby lying in a manger. ^17 And when they saw it, they made known the saying that\
  \ had been told them concerning this child. ^18 And all who heard it wondered at what the shepherds\
  \ told them. ^19 But Mary treasured up all these things, pondering them in her heart. ^20 And the shepherds\
  \ returned, glorifying and praising God for all they had heard and seen, as it had been told them."
recap:
- This week, Pastor Pete Dahlem continued our Adore Advent series with “Worship with Presence,” inviting
  us to see the birth of Jesus not as a sentimental moment but as the climactic unveiling of God’s presence
  entering human history. From Luke 2, Pastor Pete highlighted how the incarnation took place in a specific
  time, in a specific town, through a specific family line—fulfilling Isaiah and Micah’s prophecies and
  restoring what humanity lost in Genesis 3. Even the detail that “there was no place for them in the
  inn” reminds us that God’s plan unfolds not just in majestic scenes but in the ordinary, inconvenient,
  and overlooked moments of life. Into that obscurity, God came near—Immanuel, God with us.
- 'We also saw how heaven responded: an army of angels appearing not to kings or priests but to shepherds,
  announcing peace instead of war. God’s victory arrives not through domination but through worship. And
  the shepherds model the right response to God’s presence: they go with haste, they bear witness to what
  they’ve seen and heard, they cultivate awe, and they treasure the gospel. Pastor Pete challenged us
  to reconsider what worship truly is—not content, convenience, or inspiration, but embodied presence
  before God and with God’s people. In a world increasingly virtual, isolated, and disembodied, Advent
  calls us back to a faith that shows up. Worship that engages our whole selves. A presence that reflects
  Jesus’ own presence with us.'
- The
one_thing: Worship Jesus with fully embodied presence.
discussion_questions:
  Connecting:
  - During the holiday season, what is something simple—like music, lights, or gathering with others—that
    helps you feel more “present” in the moment?
  - When’s the last time you dropped what you were doing and went “with haste” to something good or exciting?
  Confessing:
  - In what ways has your worship become more “virtual,” detached, or convenience-driven than God-centered
    and present?
  - What tends to keep you from showing up—physically, emotionally, or spiritually—when God invites you
    into His presence?
  Considering:
  - What part of the Christmas story stands out more to you this year—the humility of the manger, the
    angelic announcement, or the shepherds’ response? Why?
  - How does seeing worship as something embodied rather than just spiritual reshape your understanding
    of gathering with the church?
  Committing:
  - What is one intentional step you can take to be more fully present in worship this Advent season?
  - Who might you encourage or testify to this week, like the shepherds did, about something God has shown
    or reminded you of?
  - What is one way you can “take your worship with you” into work, family gatherings, or everyday life
    this week?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
