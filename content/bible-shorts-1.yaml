series: BIBLE SHORTS
part: 'Part 1: PHILEMON'
order: 9
date: 2026-04-19
scripture_title: Philemon
scripture_passage:
- '^1 Paul, a prisoner for Christ Jesus, and Timothy our brother,

  To Philemon our beloved fellow worker ^2 and Apphia our sister and Archippus our fellow soldier, and
  the church in your house:

  ^3 Grace to you and peace from God our Father and the Lord Jesus Christ.

  ^4 I thank my God always when I remember you in my prayers, ^5 because I hear of your love and of the
  faith that you have toward the Lord Jesus and for all the saints, ^6 and I pray that the sharing of
  your faith may become effective for the full knowledge of every good thing that is in us for the sake
  of Christ. ^7 For I have derived much joy and comfort from your love, my brother, because the hearts
  of the saints have been refreshed through you.

  ^8 Accordingly, though I am bold enough in Christ to command you to do what is required, ^9 yet for
  love''s sake I prefer to appeal to you—I, Paul, an old man and now a prisoner also for Christ Jesus—
  ^10 I appeal to you for my child, Onesimus, whose father I became in my imprisonment. ^11 (Formerly
  he was useless to you, but now he is indeed useful to you and to me.) ^12 I am sending him back to you,
  sending my very heart. ^13 I would have been glad to keep him with me, in order that he might serve
  me on your behalf during my imprisonment for the gospel, ^14 but I preferred to do nothing without your
  consent in order that your goodness might not be by compulsion but of your own accord. ^15 For this
  perhaps is why he was parted from you for a while, that you might have him back forever, ^16 no longer
  as a bondservant but more than a bondservant, as a beloved brother—especially to me, but how much more
  to you, both in the flesh and in the Lord.

  ^17 So if you consider me your partner, receive him as you would receive me. ^18 If he has wronged you
  at all, or owes you anything, charge that to my account. ^19 I, Paul, write this with my own hand: I
  will repay it—to say nothing of your owing me even your own self. ^20 Yes, brother, I want some benefit
  from you in the Lord. Refresh my heart in Christ.

  ^21 Confident of your obedience, I write to you, knowing that you will do even more than I say. ^22
  At the same time, prepare a guest room for me, for I am hoping that through your prayers I will be graciously
  given to you.

  ^23 Epaphras, my fellow prisoner in Christ Jesus, sends greetings to you, ^24 and so do Mark, Aristarchus,
  Demas, and Luke, my fellow workers.

  ^25 The grace of the Lord Jesus Christ be with your spirit.'
recap:
- 'This message launched a new sermon series called "Bible Shorts," a return to expository preaching through
  shorter, often-neglected books of the Bible. Pastor Pete opened with the story of Matthew Lane, a college
  student who began hacking at age 14, eventually broke into a grading system used by 70 million people,
  and is now serving four years in federal prison. What made the story striking wasn''t the crime — it
  was his response: "I''m so thankful I got caught. I think I need to go to prison for what I did, and
  I''m okay with that." That posture of honest accountability set the stage for the letter of Philemon,
  a 25-verse personal letter from the Apostle Paul that raises some of the most searching questions in
  all of scripture: How do people change? How does the gospel transform relationships? How do we live
  out forgiveness in real community?'
- 'The letter involves three people. Paul is writing from prison in Rome around 60 AD. Philemon is a church
  leader in Colossae whose home hosted the local congregation — a man Paul describes warmly as a beloved
  fellow worker who had refreshed the hearts of many believers. And Onesimus is a slave belonging to Philemon
  who had wronged his master (possibly by stealing), run away over a thousand miles to Rome, and there
  — remarkably — became a Christian through Paul. Paul is now sending Onesimus back with this letter,
  asking Philemon to receive him not as a runaway slave to be punished, but as a free and beloved brother
  in Christ. Pastor Pete was honest about the discomfort in the text: Why doesn''t Paul condemn slavery
  outright? Where is Onesimus''s voice? These are real questions, and sitting with them honestly is part
  of what makes this letter so rich.'
- 'What''s striking about Paul''s approach is that he doesn''t simply command Philemon to free Onesimus
  — even though he says he has the authority to do so. Instead he appeals, for love''s sake, asking Philemon
  to make this decision freely and from the heart. Pastor Pete explained why that matters: if Paul simply
  declared Onesimus free, it would solve the legal situation but not the relational one. Philemon might
  technically comply while still seeing Onesimus as a reminder of theft and public shame. Onesimus might
  technically be free but know it wasn''t freely given. Paul wanted something deeper — genuine gospel
  transformation, not just rule-following. He wanted the church in Colossae to learn what it actually
  looks like to live out Colossians 3:11, where there is no longer slave or free, but Christ is all and
  in all.'
- 'Pastor Pete closed by noting what Paul asks of Philemon: receive Onesimus back forever, no longer as
  a slave but as a beloved brother, as you would receive me — and charge anything he owes to my account.
  It''s a picture of substitutionary love that mirrors the gospel itself. And historically, it had real
  teeth: abolitionists in the 19th century pointed directly to this letter as evidence that the logic
  of the gospel is incompatible with slavery. Many scholars believe the Onesimus of this letter went on
  to become Bishop of Ephesus — a former slave who became a church leader, reconciled with his former
  master as a brother. That''s what the gospel does.'
discussion_questions:
  Connecting:
  - Matthew Lane said he was "so thankful" he got caught. Have you ever experienced a consequence or setback
    that turned out to be exactly what you needed? What happened?
  - Have you ever received an apology or act of forgiveness that genuinely surprised you? What made it
    meaningful?
  Confessing:
  - Pastor Pete described how it's possible to obey the letter of the law while completely missing the
    spirit — technically forgiving someone while still holding something against them. Is there a relationship
    in your life where you've done that?
  - Paul says God was doing a genuine work of faith in the life of a slave owner. Is there someone in
    your life you've written off as beyond real change — including yourself? What would it look like to
    believe God could work there?
  Considering:
  - In Philemon 8–14, Paul says he has the authority to command Philemon but chooses to appeal instead.
    What does that tell us about how Paul understood the difference between outward compliance and genuine
    heart change?
  - Looking at verses 15–17, what specific things does Paul ask Philemon to do — and how does each one
    go beyond just following a rule?
  Committing:
  - Paul challenged Philemon not through social pressure or public shaming, but through a personal, relational
    appeal. Is there someone in your life you need to lovingly challenge to live out their faith — and
    have you been avoiding it?
  - What is one specific relationship in your life where God is calling you toward forgiveness, reconciliation,
    or seeing someone differently because of the gospel?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
next_steps_title: 'Part 1: Philemon'
next_steps:
- Ask God for heart change in a specific relationship — not just the right action, but the right spirit
  behind it.
- Read Philemon again on your own this week alongside Colossians 3:1–17, and let Paul's vision of gospel
  community challenge you.
- Identify one person you've been relating to primarily by their failure or their past — and ask God how
  the gospel should change how you see them.
- If there's a broken relationship you've been avoiding, take one small step toward reconciliation this
  week.
