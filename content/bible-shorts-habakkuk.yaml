series: BIBLE SHORTS
part: Habakkuk
date: '2026-07-05'
scripture_title: Habakkuk 1:1-4, 3
scripture_ref: Habakkuk 1:1-4;Habakkuk 3
preacher: Pastor Pete
recap:
- 'Continuing the Bible Shorts series, Pastor Pete turned to Habakkuk, a book that gives honest voice
  to a struggle many of us carry. Writing between Assyria''s and Babylon''s conquests, Habakkuk cries
  out over injustice both around him and within God''s own people, asking the questions we still ask:
  "How long?" and "Why?" Pastor Pete connected this to the anxiety many feel today about the nation and,
  more personally, about their own lives.'
- 'In chapters 1-2, God answers: He will use Babylon to judge Judah, then judge Babylon too. The section
  ends with an invitation to come meet God in His holy temple and be still. Chapter 3 is Habakkuk''s response,
  a psalm reflecting on "the report" of everything God had done in history. The big takeaway: we know
  God not just by what He says but by what He does. His actions match His word, and that faithfulness
  is what makes Him trustworthy.'
- 'Habakkuk recalls three things God has done: made a covenant with His people, shown power over the nations
  and their so-called gods, and fought to save His people. The phrase "crush the head" reaches back to
  Genesis 3:15, revealing these were never merely military battles but one spiritual battle God wins,
  ultimately at the cross. Habakkuk''s closing "yet" statements model mature faith: "yet I will quietly
  wait" (trusting God''s timing over paralysis by fear) and "yet I will rejoice" (worship rooted in God''s
  character, not circumstances). Pastor Pete closed with the allegory Hinds'' Feet on High Places, inviting
  the church to sit still in God''s presence, because sometimes what we need most isn''t answers but Him.'
one_thing: Trust and rejoice because God fights for our salvation.
discussion_questions:
  Connecting:
  - Who in your life is known for being true to their word? What does their follow-through do for your
    trust in them?
  - Have you ever had a "no filter" friend who said what everyone was thinking? How is Habakkuk like that?
  Considering:
  - In Habakkuk 1:1-4, what specific complaints does Habakkuk bring to God? Which resonate with you?
  - Read Habakkuk 3:3-15. How does Habakkuk show that God is greater than the "gods" (sun, mountains,
    seas) the nations feared?
  - Trace "crush the head" from Habakkuk 3:13 back to Genesis 3:15. How does this reframe the battles
    as one spiritual conflict?
  Confessing:
  - What "How long?" or "Why?" question are you carrying into God's presence right now?
  - Is your worship more circumstantial (based on how your day is going) or rooted in God's character?
    Be honest.
  - Where are you currently living in paralysis, anxiety, or fear rather than quiet trust?
  Committing:
  - What situation do you need to lay down and say, "God, I trust your timing even though I don't understand"?
  - What would it look like this week to rejoice in God before your circumstances change?
  - How could you regularly rehearse "the report" of what God has done, in Scripture and in your own life?
next_steps:
- Set aside unhurried, quiet time this week simply to be still in God's presence rather than to get answers.
- Write down one "How long / Why" question and surrender it to God in prayer, trusting His timing.
- Practice worship rooted in God's character during a hard circumstance, not only when things go your
  way.
