series: BLESSED
part: 'Part 3: Living In God’s Blessing'
order: 33
date: 2025-11-02
scripture_title: 1 Peter 3:8-9
preacher: Pastor Pete Dahlem
scripture_passage:
- ^8 Finally, all of you, have unity of mind, sympathy, brotherly love, a tender heart, and a humble mind.
  ^9 Do not repay evil for evil or reviling for reviling, but on the contrary, bless, for to this you
  were called, that you may obtain a blessing.
recap:
- 'This week, Pastor Peter continued our Blessed series with a message from 1 Peter 3:8–9 on what it means
  to live a life in God’s blessing. Over the past few weeks, we’ve seen that God’s blessing gives us relationship,
  identity, and the benefits of His redeemed children, and that through Christ we’ve been freed from the
  curse. But the question now is: What will we do with the blessing we’ve received? Scripture teaches
  that to live in God’s blessing is not only to receive it but also to give it—to be people who bless
  others, even those who wrong us. “Do not repay evil for evil,” Peter writes, “but on the contrary, bless,
  for to this you were called, that you may obtain a blessing.”'
- 'We naturally tend toward curses—division, pride, or resentment—but followers of Jesus are called to
  choose the opposite: to speak life, encouragement, and truth. God designed blessing to flow through
  us, not just to us. Throughout Scripture, we see God’s people blessing one another with favor, truth,
  and calling—declaring God’s promises, affirming one another’s identity, and speaking encouragement into
  the lives of others. Yet many of us struggle to give or receive blessing because of pride, fear, or
  the wounds of unblessed lives. When we live unaware of how deeply God delights in us, we can withhold
  blessing from others or believe we don’t deserve it ourselves.'
- The good news is that God’s blessing restores what human blessing cannot. We don’t bless others to get
  something in return—we bless because we have already received abundantly in Christ. When we cultivate
  gratitude, depend on God’s grace, and intentionally affirm others, His blessing multiplies. The
one_thing: receive abundantly so you can bless abundantly.
discussion_questions:
  Connecting:
  - What’s something—big or small—that brought you a sense of gratitude or joy this week?
  - Can you think of a time when someone’s words or encouragement deeply blessed you? What made it meaningful?
  Considering:
  - According to 1 Peter 3:8–9, why are Christians called to bless others—even those who hurt or oppose
    us?
  - What are some different ways we can bless others with our words, prayers, or actions?
  Confessing:
  - What makes it difficult for you personally to bless others—or to receive blessing from others?
  - Are there any relationships where you’ve been tempted to withhold blessing, forgiveness, or encouragement?
  Committing:
  - What is one specific way you can intentionally bless someone this week—with prayer, affirmation, or
    encouragement?
  - How can you develop a more thankful heart that focuses on what God has already given rather than what
    you lack?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
