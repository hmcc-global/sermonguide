series: Lifelong discipleship
part: One part Sunday celebration
order: 32
date: 2025-11-09
scripture_title: Hebrews 11:23–28
preacher: Pastor Pete Dahlem
scripture_passage:
- '“By faith Moses, when he was born, was hidden for three months by his parents, because they saw that
  the child was beautiful, and they were not afraid of the king’s edict. By faith Moses, when he was grown
  up, refused to be called the son of Pharaoh’s daughter, choosing rather to be mistreated with the people
  of God than to enjoy the fleeting pleasures of sin. He considered the reproach of Christ greater wealth
  than the treasures of Egypt, for he was looking to the reward. By faith he left Egypt, not being afraid
  of the anger of the king, for he endured as seeing him who is invisible. By faith he kept the Passover
  and sprinkled the blood, so that the Destroyer of the firstborn might not touch them.”

  ‭‭Hebrews‬ ‭11‬:‭23‬-‭28‬ ‭ESV‬‬'
recap:
- 'This week, Pastor Pete taught from Hebrews 11:23–28 on Lifelong Discipleship, looking at the life of
  Moses as a picture of faith that endures through every season of life. Moses’ story reminds us that
  discipleship is not a moment or a ministry role—it’s a lifelong journey of walking with God. From his
  birth in danger, to his years in Pharaoh’s palace, to forty years in the wilderness, and finally to
  the edge of the Promised Land, Moses’ life reveals the stages of discipleship: learning to get our lives
  together, learning to give our lives away, and ultimately learning to give our deaths away.'
- 'In his early years, Moses wrestled to understand his value and purpose, struggling with identity and
  failure before finding something worth giving his life for. In maturity, he learned to serve others,
  confronting weakness, frustration, and inadequacy as God reshaped his zeal into humble faithfulness.
  And in his final years, Moses modeled what it means to finish well—blessing the next generation, releasing
  control, and trusting God to complete what he had begun. Each season brought new challenges, but the
  same call: to live by faith, seeing “Him who is invisible.”'
- True discipleship, then, is not about perfection or success—it’s about continually giving ourselves
  away in love, even as we grow older, weaker, and more dependent on God. Every stage of life is a new
  invitation to follow Him more deeply and pass on His blessing more freely. The
one_thing: give your life away through a lifelong journey of discipleship.
discussion_questions:
  Connecting:
  - When you think about discipleship, what’s one word or image that comes to mind?
  - Who has been a significant influence or example of lifelong faith in your life?
  Considering:
  - What does Moses’ example teach us about how faith can look different in each season of life?
  - In what ways does Hebrews 11 show that discipleship is more about endurance and faithfulness than
    success or comfort?
  Confessing:
  - Which stage of discipleship do you most identify with right now—getting your life together, giving
    your life away, or preparing to pass it on?
  - Are there past failures, fears, or insecurities that you sense God wants to redeem for His purposes?
  Committing:
  - What is one way you can intentionally give your life away this week—through serving, mentoring, or
    blessing someone else?
  - How can you cultivate a long-term view of discipleship that keeps growing deeper rather than settling
    into comfort?
