series: INSIDE OUT
part: 'Part 2: SURRENDER'
order: 17
date: 2026-02-22
scripture_title: Genesis 22:1-14
preacher: Pastor Pete Dahlem
scripture_passage:
- After these things God tested Abraham and said to him, “Abraham!” And he said, “Here I am.”2 He said,
  “Take your son, your only son Isaac, whom you love, and go to the land of Moriah, and offer him there
  as a burnt offering on one of the mountains of which I shall tell you.” ^3 So Abraham rose early in
  the morning, saddled his donkey, and took two of his young men with him, and his son Isaac. And he cut
  the wood for the burnt offering and arose and went to the place of which God had told him. ^4 On the
  third day Abraham lifted up his eyes and saw the place from afar. ^5 Then Abraham said to his young
  men, “Stay here with the donkey; I and the boy will go over there and worship and come again to you.”
  ^6 And Abraham took the wood of the burnt offering and laid it on Isaac his son. And he took in his
  hand the fire and the knife. So they went both of them together.7 And Isaac said to his father Abraham,
  “My father!” And he said, “Here I am, my son.” He said, “Behold, the fire and the wood, but where is
  the lamb for a burnt offering?” ^8 Abraham said, “God will provide for himself the lamb for a burnt
  offering, my son.” So they went both of them together.
- ^9 When they came to the place of which God had told him, Abraham built the altar there and laid the
  wood in order and bound Isaac his son and laid him on the altar, on top of the wood. ^10 Then Abraham
  reached out his hand and took the knife to slaughter his son. ^11 But the angel of the Lordcalled to
  him from heaven and said, “Abraham, Abraham!” And he said, “Here I am.” ^12 He said, “Do not lay your
  hand on the boy or do anything to him, for now I know that you fear God, seeing you have not withheld
  your son, your only son, from me.” ^13 And Abraham lifted up his eyes and looked, and behold, behind
  him was a ram, caught in a thicket by his horns. And Abraham went and took the ram and offered it up
  as a burnt offering instead of his son. ^14 So Abraham called the name of that place, “The Lord will
  provide”; as it is said to this day, “On the mount of the Lord it shall be provided.”
recap:
- 'Pastor Pete continued the Inside Out series by asking a central question: How does true transformation
  happen? Benjamin Franklin once attempted “moral perfection” through strict self-discipline and a list
  of virtues—but even trying to become humble made him proud. Many of us discovered during ODF that external
  changes—what we eat, watch, or attend—don’t instantly change our hearts. Real transformation happens
  from the inside out. If repentance is agreeing with God about reality, surrender is trusting God enough
  to yield control.'
- 'In Mark 8, Jesus gives a clear but costly invitation: deny yourself, take up your cross, and follow
  Him. Holding onto our lives leads to loss; surrendering them leads to life. Genesis 22 shows what surrender
  looks like in practice. God tested Abraham by asking him to sacrifice Isaac—the very son through whom
  God had promised to bless the nations. The command seemed contradictory and horrifying. Yet Abraham
  obeyed step by step, trusting that “The LORD will provide.” Surrender required him to release what he
  treasured most and trust God beyond what made sense.'
- At the climax of the story, God provided a ram in Isaac’s place. Abraham learned that surrender does
  not end in loss—it leads to provision. “The Lord will provide” does not mean we get everything we want;
  it means God gives what we truly need. Ultimately, He provided His own Son, Jesus Christ. Because of
  that, we can surrender our regrets, expectations, relationships, reputation, control, and desire for
  vengeance. When we release what we cling to, we discover freedom.
discussion_questions:
  Connecting:
  - In movies or sports, why do you think it’s so hard for a character or team to “let go” of control?
  - What’s something people commonly hold onto even when it clearly isn’t helping them?
  Considering:
  - In Genesis 22, what specific steps show Abraham’s obedience and trust in God?
  - What does the phrase “The LORD will provide” reveal about God’s character in this story?
  Confessing:
  - Which areas (regrets, expectations, reputation, control, etc.) are hardest for you to surrender to
    God?
  - Where might fear or distrust be keeping you from fully yielding to Him?
  Committing:
  - What would practical surrender look like in one area of your life this week?
  - How can remembering God’s ultimate provision in Jesus strengthen your trust and obedience?
