series: BIBLE SHORTS
part: Titus 3
date: '2026-06-28'
recap:
- 'Wrapping up the church''s walk through Titus in the Bible Shorts series, Pastor Pete picked up exactly
  where Pastor Sam left off the week before. The whole letter is Paul writing to young Titus to "put what
  remained into order" in the broken-culture churches of Crete, and chapter 3 continues the same thread
  on how the way we live reflects God. The one thing for the day: do good works in response to God''s
  good work.'
- 'Pastor Pete first zoomed out on the theme of good works, which runs across the entire letter. Coming
  out of the Protestant Reformation, many of us rightly know our works can''t save us (Ephesians 2:8-9),
  so we can flinch when Paul talks so much about good works. But Ephesians 2:10 completes the picture:
  we are God''s workmanship, created for good works. We don''t do them to earn forgiveness, salvation,
  or love, but because we already have all of that in Christ. The motivation shifts entirely from earning
  to grateful response.'
- From there he walked through two issues Paul raises in chapter 3. The first is how we respond to authority.
  Sharing how he and his wife Gina came from opposite cultural instincts toward authority (Western-individualist
  skepticism vs. Korean deference), he noted Scripture challenged each of them in opposite directions.
  Holding the tension biblically means treating authority figures with respect and honor, actively supporting
  the leaders in our lives, modeling godly leadership ourselves, and yet also standing on principle and
  speaking prophetically when authority goes against God (Acts 5, the Old Testament prophets, the Hebrew
  midwives).
- 'The second issue is how we treat all people. Paul says to slander no one and to show perfect courtesy
  toward everyone. Pastor Pete applied this pointedly to today: social-media algorithms engineered for
  outrage and tribalism are quietly discipling us far more hours than our spiritual habits are, and some
  prominent public "Christian" personalities model belittling and dehumanizing behavior we should refuse
  to imitate. The call is to treat all people with gentleness and courtesy, avoid gossip and slander (and
  hold each other accountable for it), and model gracious disagreement.'
- 'He closed with three reasons we live this way: because we were once foolish ourselves, so we can be
  patient with others; because God saved us by mercy and the renewal of the Holy Spirit, not by our own
  righteousness; and because we can make a difference, devoting ourselves to good works that meet urgent
  needs and bear real fruit. The King of kings, the ultimate authority, stepped in to save us, and trusting
  Him is what frees us to live actively and fruitfully for His kingdom.'
one_thing: Do good works in response to God's good work.
discussion_questions:
  Connecting:
  - Growing up, were you raised to be more skeptical of authority or more deferential toward it? How has
    that shaped you?
  - Roughly how many hours a week do you think you spend on a screen for non-work media? Did the "49 hours"
    stat surprise you?
  Considering:
  - Read Titus 3:1-2. What specific behaviors does Paul list, and what might they have looked like in
    Crete's culture?
  - How do Ephesians 2:8-9 and Ephesians 2:10 fit together? Why does Paul emphasize good works if works
    can't save us?
  - Hold Titus 3:1 (be submissive to authorities) next to Acts 5:29 (we must obey God rather than men).
    How do you carry both?
  Confessing:
  - 'Where do you tend to land: harshly critical of others'' mistakes, or honestly aware of your own depravity?
    What does that reveal?'
  - Is there a way the algorithms you consume are "discipling" you away from gentleness, courtesy, or
    peace?
  - Have you spoken evil of, gossiped about, or torn down someone you disagree with recently?
  Committing:
  - Who is one leader (parent, manager, teacher, church leader) you could actively support this week?
  - What's one change to what you consume or how you engage online that would help you treat all people
    with courtesy?
  - Where do you keep asking "why can't I change?" — and what would it look like to instead pray "God,
    change me"?
next_steps:
- Pick one authority figure in your life and find a concrete way to support, honor, or encourage them
  this week.
- 'Audit one media feed: warn it, then mute or unfollow the sources stoking outrage and tribalism in you.'
- Bring a recurring area of struggle to God in prayer, asking the Holy Spirit to change your heart rather
  than relying on willpower.
