date: 2026-05-24
scripture_title: Obadiah 1
preacher: Reverend Ronald White
scripture_passage:
- "^1 The vision of Obadiah.\nThus says the Lord God concerning Edom:\nWe have heard a report from the\
  \ Lord,\n    and a messenger has been sent among the nations:\n“Rise up! Let us rise against her for\
  \ battle!”\n^2 Behold, I will make you small among the nations;\n    you shall be utterly despised.\n\
  ^3 The pride of your heart has deceived you,\n    you who live in the clefts of the rock,\n    in your\
  \ lofty dwelling,\nwho say in your heart,\n    “Who will bring me down to the ground?”\n^4 Though you\
  \ soar aloft like the eagle,\n    though your nest is set among the stars,\n    from there I will bring\
  \ you down,\ndeclares the Lord.\n^5 If thieves came to you,\n    if plunderers came by night—\n    how\
  \ you have been destroyed!—\n    would they not steal only enough for themselves?\nIf grape gatherers\
  \ came to you,\n    would they not leave gleanings?\n^6 How Esau has been pillaged,\n    his treasures\
  \ sought out!\n^7 All your allies have driven you to your border;\n    those at peace with you have\
  \ deceived you;\nthey have prevailed against you;\n    those who eat your bread have set a trap beneath\
  \ you—\n    you have no understanding.\n^8 Will I not on that day, declares the Lord,\n    destroy the\
  \ wise men out of Edom,\n    and understanding out of Mount Esau?\n^9 And your mighty men shall be dismayed,\
  \ O Teman,\n    so that every man from Mount Esau will be cut off by slaughter.\n^10 Because of the\
  \ violence done to your brother Jacob,\n    shame shall cover you,\n    and you shall be cut off forever.\n\
  ^11 On the day that you stood aloof,\n    on the day that strangers carried off his wealth\nand foreigners\
  \ entered his gates\n    and cast lots for Jerusalem,\n    you were like one of them.\n^12 But do not\
  \ gloat over the day of your brother\n    in the day of his misfortune;\ndo not rejoice over the people\
  \ of Judah\n    in the day of their ruin;\ndo not boast\n    in the day of distress.\n^13 Do not enter\
  \ the gate of my people\n    in the day of their calamity;\ndo not gloat over his disaster\n    in the\
  \ day of his calamity;\ndo not loot his wealth\n    in the day of his calamity.\n^14 Do not stand at\
  \ the crossroads\n    to cut off his fugitives;\ndo not hand over his survivors\n    in the day of distress.\n\
  ^15 For the day of the Lord is near upon all the nations.\nAs you have done, it shall be done to you;\n\
  \    your deeds shall return on your own head.\n^16 For as you have drunk on my holy mountain,\n   \
  \ so all the nations shall drink continually;\nthey shall drink and swallow,\n    and shall be as though\
  \ they had never been.\n^17 But in Mount Zion there shall be those who escape,\n    and it shall be\
  \ holy,\nand the house of Jacob shall possess their own possessions.\n^18 The house of Jacob shall be\
  \ a fire,\n    and the house of Joseph a flame,\n    and the house of Esau stubble;\nthey shall burn\
  \ them and consume them,\n    and there shall be no survivor for the house of Esau,\nfor the Lord has\
  \ spoken.\n^19 Those of the Negeb shall possess Mount Esau,\n    and those of the Shephelah shall possess\
  \ the land of the Philistines;\nthey shall possess the land of Ephraim and the land of Samaria,\n  \
  \  and Benjamin shall possess Gilead.\n^20 The exiles of this host of the people of Israel\n    shall\
  \ possess the land of the Canaanites as far as Zarephath,\nand the exiles of Jerusalem who are in Sepharad\n\
  \    shall possess the cities of the Negeb.\n^21 Saviors shall go up to Mount Zion\n    to rule Mount\
  \ Esau,\n    and the kingdom shall be the Lord's."
recap:
- Obadiah is a single chapter, just 21 verses, but it tells the story of a family feud that goes back
  generations. To understand the book, you have to go back to Genesis. Edom descended from Esau, and Israel
  descended from Jacob. The two were twin brothers, and their conflict started before they were even born.
  Rebekah was told by God that two nations were in her womb and that the older would serve the younger.
  That prophetic reversal set off a feud that played out across the rest of scripture. Esau sold his birthright
  for a bowl of soup. Jacob and his mother deceived Isaac to steal Esau's blessing. The bitterness echoed
  through centuries of history between their descendants.
- Obadiah confronts Edom for what they did when Babylon came and ransacked Jerusalem. They didn't attack
  Israel directly. They stood on the sidelines and watched. They rejoiced. They looted what little was
  left. When Israelites tried to escape, Edom cut them off and handed them over to the enemy. Dr. White
  pointed out that doing nothing when your brother is suffering is its own kind of betrayal. Indifference
  is not neutral. God holds Edom accountable not just for what they did, but for what they refused to
  do.
- Dr. White then shared something from his own life. He described a moment when something from his past
  surfaced publicly just as he was stepping into a significant ministry opportunity. His first instinct
  was revenge. He wanted to find dirt on the person who exposed him and return the hurt. He worked through
  why a Christian can't go there. Colossians 3 calls us to bear with one another and forgive. Ephesians
  4 calls us to be tenderhearted and forgiving as God has forgiven us. Because God forgave us for things
  we actually did, we have no standing to withhold forgiveness from others.
- Dr. White closed in Matthew 7. Many will say "Lord, Lord" and hear "I never knew you." Attending church,
  carrying a Bible, quoting scripture, doing ministry, none of that is the same as knowing Jesus. And
  knowing Jesus has to show up in how we treat the people around us, especially the ones who are suffering
  and the ones who have wronged us.
one_thing: Real Christianity shows up in how you treat your family, spiritual and otherwise, especially
  when it costs you something.
discussion_questions:
  Connecting:
  - Have you ever had an old mistake resurface at the worst possible time?
  - What's the pettiest family feud you've ever witnessed or heard about?
  Considering:
  - In verses 10-14, what specific things does God hold Edom accountable for, and which involve action
    versus simply standing by?
  - What does Matthew 7:21-23 say about the difference between doing things in Jesus's name and actually
    knowing him?
  Confessing:
  - Is there a situation where you've been standing on the sidelines when you could have helped?
  - Is there someone you've been withholding forgiveness from, and what's the real reason?
  Committing:
  - What is one concrete action you can take this week for someone in your community who is struggling?
  - Who is one person God has put in your life that you've been treating as not your problem?
next_steps_intro: As part of our annual theme, Deep & Wide, we invite our church family to go deeper in
  relationship with God so that we can be the greatest blessing to one another and the world around us.
  Each week, we will follow up from the sermon with simple, practical steps to help us receive God’s blessing
  and apply the truths of the gospel more deeply into our lives.
next_steps_title: 'Part 6: Obadiah'
next_steps:
- Read the rest of Obadiah and notice how it moves from accountability to the Day of the Lord to hope.
- Ask God honestly whether your faith is a checklist or a relationship and sit with whatever answer comes.
- Identify one person you can practically help this week, not just pray for.
