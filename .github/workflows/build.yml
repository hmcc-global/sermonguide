name: Build and deploy sermon guides

# Rebuild the whole site on every push to main that touches content or code.
on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "templates/**"
      - "static/**"
      - "build.py"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}   # also allow manual runs from the Actions tab
  workflow_call: {}       # let other workflows (e.g. new-guide) run the deploy

# Permissions needed to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Always build the latest main tip. Matters when this workflow is
          # called right after another job pushed a commit (e.g. new-guide),
          # since the default checkout would use the older triggering SHA.
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the site (rebuilds every guide in content/)
        run: python build.py
        env:
          # Optional: lets CI fetch passages from the ESV API on a cache miss.
          # Without it, the build reads committed content/.cache and falls back
          # to scripture_passage in the YAML.
          ESV_API_KEY: ${{ secrets.ESV_API_KEY }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload the generated site
        uses: actions/upload-pages-artifact@v5
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
